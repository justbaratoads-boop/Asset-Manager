components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    LoginBody:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
      required:
        - email
        - password

    LoginResponse:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"
      required:
        - token
        - user

    User:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        role:
          type: string
        phone:
          type: ["string", "null"]
        isActive:
          type: boolean
        createdAt:
          type: string
      required:
        - id
        - name
        - email
        - role
        - isActive
        - createdAt

    CreateUserBody:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        password:
          type: string
        role:
          type: string
          enum: [admin, manager, accountant, sales_staff, driver, view_only]
        phone:
          type: ["string", "null"]
      required:
        - name
        - email
        - password
        - role

    UpdateUserBody:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        password:
          type: ["string", "null"]
        role:
          type: string
          enum: [admin, manager, accountant, sales_staff, driver, view_only]
        phone:
          type: ["string", "null"]
        isActive:
          type: boolean

    DashboardSummary:
      type: object
      properties:
        todaySales:
          type: number
        todayCollections:
          type: number
        pendingOrders:
          type: integer
        pendingPayments:
          type: number
        lowStockCount:
          type: integer
        monthSales:
          type: number
        monthPurchases:
          type: number
      required:
        - todaySales
        - todayCollections
        - pendingOrders
        - pendingPayments
        - lowStockCount
        - monthSales
        - monthPurchases

    ActivityItem:
      type: object
      properties:
        id:
          type: integer
        type:
          type: string
        description:
          type: string
        amount:
          type: ["number", "null"]
        partyName:
          type: ["string", "null"]
        createdAt:
          type: string
      required:
        - id
        - type
        - description
        - createdAt

    Party:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        type:
          type: string
          enum: [customer, supplier, both]
        address:
          type: ["string", "null"]
        city:
          type: ["string", "null"]
        state:
          type: ["string", "null"]
        pincode:
          type: ["string", "null"]
        gstin:
          type: ["string", "null"]
        pan:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        email:
          type: ["string", "null"]
        creditLimit:
          type: ["number", "null"]
        openingBalance:
          type: number
        balanceType:
          type: string
          enum: [dr, cr]
        currentBalance:
          type: ["number", "null"]
