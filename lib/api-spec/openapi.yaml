          description: Invoice
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SaleInvoice"
        "404":
          description: Not found
    patch:
      operationId: updateSaleInvoice
      tags: [saleInvoices]
      summary: Update sale invoice
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
