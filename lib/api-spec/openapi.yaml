      operationId: getOrder
      tags: [orders]
      summary: Get order
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
    patch:
      operationId: updateOrder
      tags: [orders]
      summary: Update order / status
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
