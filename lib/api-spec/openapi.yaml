openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Accounting & Business Management API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: auth
  - name: dashboard
  - name: parties
  - name: ledgers
  - name: stockCategories
  - name: stockItems
  - name: stockTransactions
  - name: saleInvoices
  - name: orders
  - name: purchaseInvoices
  - name: purchaseOrders
  - name: journals
  - name: payments
  - name: receipts
  - name: creditNotes
  - name: debitNotes
  - name: deliveries
  - name: vehicles
  - name: users
  - name: roles
  - name: companySettings
  - name: gstReports
  - name: reports

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # AUTH
  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginBody"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          description: Invalid credentials

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Logged out

  # DASHBOARD
  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Dashboard summary stats
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/recent-activity:
    get:
      operationId: getRecentActivity
      tags: [dashboard]
      summary: Recent activity
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Recent activity list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityItem"

  /dashboard/low-stock-alerts:
    get:
      operationId: getLowStockAlerts
      tags: [dashboard]
      summary: Low stock items
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Low stock items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StockItem"

  # PARTIES
  /parties:
    get:
      operationId: listParties
      tags: [parties]
      summary: List all parties
      security:
        - bearerAuth: []
      parameters:
        - name: type
          in: query
          schema:
            type: string
            enum: [customer, supplier, both]
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of parties
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Party"
    post:
      operationId: createParty
      tags: [parties]
      summary: Create party
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePartyBody"
      responses:
        "201":
          description: Party created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Party"

  /parties/{id}:
    get:
      operationId: getParty
      tags: [parties]
      summary: Get party by ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Party
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Party"
        "404":
          description: Not found
    patch:
      operationId: updateParty
      tags: [parties]
      summary: Update party
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePartyBody"
      responses:
        "200":
          description: Party updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Party"
    delete:
      operationId: deleteParty
      tags: [parties]
      summary: Delete party
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /parties/{id}/ledger:
    get:
      operationId: getPartyLedger
      tags: [parties]
      summary: Party ledger transactions
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: from
          in: query
          schema:
            type: string
        - name: to
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Party ledger
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PartyLedger"

  # LEDGERS
  /ledgers:
    get:
      operationId: listLedgers
      tags: [ledgers]
      summary: List ledgers
      security:
        - bearerAuth: []
      parameters:
        - name: group
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of ledgers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Ledger"
    post:
      operationId: createLedger
      tags: [ledgers]
      summary: Create ledger
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLedgerBody"
      responses:
        "201":
          description: Ledger created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ledger"

  /ledgers/{id}:
    get:
      operationId: getLedger
      tags: [ledgers]
      summary: Get ledger
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Ledger
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ledger"
    patch:
      operationId: updateLedger
      tags: [ledgers]
      summary: Update ledger
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateLedgerBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ledger"
    delete:
      operationId: deleteLedger
      tags: [ledgers]
      summary: Delete ledger
      security:
