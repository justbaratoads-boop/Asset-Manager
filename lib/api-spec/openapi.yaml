        "204":
          description: Deleted

  # STOCK ITEMS
  /stock-items:
    get:
      operationId: listStockItems
      tags: [stockItems]
      summary: List stock items
      security:
        - bearerAuth: []
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: categoryId
          in: query
          schema:
            type: integer
        - name: lowStock
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: Items
          content:
            application/json:
              schema:
                type: array
