kind = "web"
previewPath = "/"
title = "Accounting & Business Management"
version = "1.0.0"
id = "artifacts/accounting-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19080

[services.development]
run = "pnpm --filter @workspace/accounting-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/accounting-app", "run", "build" ]
publicDir = "artifacts/accounting-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19080"
BASE_PATH = "/"
